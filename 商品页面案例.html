        text-align: center;
    }

    .price {

    }

    .price span {
        text-align: center;
        font-size: 14px;
        margin-top: 20px;
        color: #ff6700;

    }

    .price del {
        font-size: 12px;
        color: #999;
        text-align: center;
        margin-top: 10px;
    }

    .container {

        flex-wrap: wrap;
        justify-content: center;
