<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
    }

    body {
        /* 让盒子在页面居中 */
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        gap: 20px;
    }

    div {
        width: 200px;
        height: 200px;
        background-color: #b6f2a6;
        border-radius: 10px;
    }

    div:hover {
        box-shadow: 0 0 10px #8ef4c1a4;
        transition: all 0.5s;
        width: 150px;
        height: 150px;
    }
</style>

<body>

    <div>1</div>
    <div>2</div>
    <div>3</div>
    <div>4</div>
    <div>5</div>
    <div>6</div>

</body>

</html>
