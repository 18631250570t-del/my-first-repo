            <!-- 下拉菜单 -->
            <div class="search-dropdown" id="searchDropdown">

                    <span>热门搜索</span>
                </div>

                    <!-- 动态生成 -->

            </div>

    <div class="carousel">
        <!-- 上一页按钮 -->

            <svg viewBox="0 0 1024 1024">

        <!-- 下一页按钮 -->
        <button class="carousel-next" aria-label="下一页">
            <svg viewBox="0 0 1024 1024">

                    d="M332.8 896L768 512 332.8 128c-19.2-16-19.2-48 0-64 19.2-16 48-16 64 0l467.2 416c19.2 16 19.2 48 0 64L396.8 896c-16 16-44.8 16-64 0-19.2-16-19.2-48 0-64z" />

            <span class="indicator"></span>
            <span class="indicator"></span>
            <span class="indicator"></span>
            <span class="indicator"></span>
        </div>
    </div>

    <!-- ==================== 分类导航 ==================== -->
    <nav class="category-nav">

                    <rect x="250" y="250" width="150" height="200" rx="10" />

            <a href="#" class="section-more">更多 ></a>
        </div>
        <div class="product-list">
            <!-- 商品卡片1 -->
            <div class="product-card">

                    <!-- 占位：月光中性笔套装图片 -->

            <!-- 商品卡片2 -->

            </div>
            <!-- 商品卡片3 -->
            <div class="product-card">
                <div class="product-img">
                    <!-- 占位：月亮贴纸包图片 -->

                <div class="product-name">月亮贴纸包</div>
                <div class="product-price">9.9</div>
            </div>
            <!-- 商品卡片4 -->

                    <!-- 占位：月夜和纸胶带图片 -->

            <p class="promo-desc">大家都在买的好物</p>
            <button class="promo-btn">去看看 ></button>
        </div>
        <!-- 限时优惠卡片 -->

            <h3 class="promo-title">限时优惠</h3>
            <p class="promo-desc">精选文具限时折扣</p>
